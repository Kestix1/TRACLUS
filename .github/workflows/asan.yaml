# ASAN/UBSAN check — critical for Rcpp packages (frequent CRAN rejection cause).
# Uses rocker/r-devel-san which compiles R with AddressSanitizer + UndefinedBehaviorSanitizer.
# Runs on push/PR and can be triggered manually; skips scheduled matrix jobs.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: asan

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rocker-org/r-devel-san:latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      ASAN_OPTIONS: detect_leaks=0

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("remotes", "rcmdcheck"), repos = "https://cloud.r-project.org")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE, repos = "https://cloud.r-project.org")'

      - name: Check with ASAN/UBSAN
        run: |
          Rscript -e 'rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--as-cran"),
            error_on = "warning",
            check_dir = "check"
          )'

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asan-check-results
          path: check
